<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>環境守護者 - AI 辨識系統</title>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-database-compat.js"></script>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 50px 20px; background-color: #f0f2f5; }
        .container { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        h1 { color: #2c3e50; }
        #status { margin: 20px 0; font-weight: bold; color: #e67e22; }
        .btn { 
            padding: 20px 40px; font-size: 1.2rem; cursor: pointer;
            background-color: #27ae60; color: white; border: none; 
            border-radius: 50px; transition: 0.3s; width: 100%; max-width: 300px;
        }
        .btn:active { transform: scale(0.95); background-color: #219150; }
    </style>
</head>
<body>
    <div class="container">
        <h1>環境守護者 AI</h1>
        <p>請將鏡頭對準垃圾進行辨識</p>
        <div id="status">等待連線中...</div>
        
        <button id="successBtn" class="btn">模擬 AI 辨識成功</button>
    </div>

    <script>
        // 使用你提供的 Firebase 配置資訊
        const firebaseConfig = {
            apiKey: "AIzaSyAWLI1eL8c7SGwxTd06rwRFgf0_KZrjNxY",
            authDomain: "environmentguardian-bf374.firebaseapp.com",
            databaseURL: "https://environmentguardian-bf374-default-rtdb.firebaseio.com",
            projectId: "environmentguardian-bf374",
            storageBucket: "environmentguardian-bf374.firebasestorage.app",
            messagingSenderId: "527271524460",
            appId: "1:527271524460:web:aea82c6e312de800780049" 
        };

        // 初始化 Firebase
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();
        const statusText = document.getElementById('status');

        // 確認連線狀態
        statusText.innerText = "系統已就緒，請點擊按鈕模擬辨識";

        // 當按鈕被按下
        document.getElementById('successBtn').onclick = function() {
            statusText.innerText = "正在傳送辨識結果...";
            
            // 更新 Firebase 節點
            database.ref('/').update({
                isScanned: true
            }).then(() => {
                statusText.innerText = "辨識成功！Unity 視窗應已關閉";
                statusText.style.color = "#27ae60";
                console.log("Firebase 更新成功！");
            }).catch((error) => {
                statusText.innerText = "連線錯誤：" + error.message;
                statusText.style.color = "#c0392b";
            });
        };
    </script>
</body>
</html>
