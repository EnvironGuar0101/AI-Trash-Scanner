<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>環境守護者 - AI 拍照辨識</title>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-database-compat.js"></script>
    <style>
        body { font-family: sans-serif; text-align: center; background: #222; color: white; margin: 0; padding: 20px; }
        #video-container { position: relative; display: inline-block; width: 100%; max-width: 500px; border: 5px solid #444; border-radius: 15px; overflow: hidden; background: #000; }
        video { width: 100%; height: auto; display: block; }
        .overlay-ui { margin-top: 20px; }
        #status { color: #00ff00; font-weight: bold; margin: 10px 0; }
        .btn { padding: 15px 40px; font-size: 1.2rem; background: #27ae60; color: white; border: none; border-radius: 50px; cursor: pointer; transition: 0.3s; }
        .btn:active { background: #2ecc71; transform: scale(0.95); }
        .btn:disabled { background: #7f8c8d; cursor: not-allowed; }
        canvas { display: none; }

        /* --- 新增：自定義彈窗樣式 --- */
        #notice-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85); /* 半透明黑 */
            display: none; /* 預設隱藏 */
            justify-content: center; align-items: center;
            z-index: 10000; 
            backdrop-filter: blur(5px); /* 背景模糊感 */
        }
        .notice-content {
            background: #333; padding: 30px; border-radius: 20px;
            border: 2px solid #27ae60; max-width: 80%;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .notice-content h3 { color: #27ae60; margin-top: 0; }
        .notice-content p { line-height: 1.6; margin-bottom: 25px; color: #eee; }
    </style>
</head>
<body>

    <div id="notice-overlay">
        <div class="notice-content">
            <h3>🌟 拍攝叮嚀</h3>
            <p>請將垃圾放置於光線充足的地方再進行拍攝，以提高辨識準確度。</p>
            <button class="btn" onclick="closeNotice()">我知道了</button>
        </div>
    </div>

    <h1>AI 垃圾辨識系統</h1>
    <div id="status">正在初始化相機...</div>

    <div id="video-container">
        <video id="webcam" autoplay playsinline></video>
    </div>

    <canvas id="canvas"></canvas>

    <div class="overlay-ui">
        <p>對準垃圾後，點擊下方進行辨識：</p>
        <button id="captureBtn" class="btn">📷 拍照並辨識</button>
    </div>

    <script>
        // 1. Firebase 配置
        const firebaseConfig = {
            apiKey: "AIzaSyAWLI1eL8c7SGwxTd06rwRFgf0_KZrjNxY",
            authDomain: "environmentguardian-bf374.firebaseapp.com",
            databaseURL: "https://environmentguardian-bf374-default-rtdb.firebaseio.com",
            projectId: "environmentguardian-bf374",
            storageBucket: "environmentguardian-bf374.firebasestorage.app",
            messagingSenderId: "527271524460",
            appId: "1:527271524460:web:aea82c6e312de800780049" 
        };

        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        const video = document.getElementById('webcam');
        const canvas = document.getElementById('canvas');
        const statusText = document.getElementById('status');
        const captureBtn = document.getElementById('captureBtn');
        const noticeOverlay = document.getElementById('notice-overlay');

        // 3. 啟動相機
        async function startCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: "environment", width: { ideal: 640 }, height: { ideal: 480 } }, 
                    audio: false 
                });
                video.srcObject = stream;
                statusText.innerText = "相機已啟動 - 準備辨識";

                // 修改：不使用 alert，改用顯示自定義遮罩
                setTimeout(() => {
                    noticeOverlay.style.display = 'flex';
                }, 500);

            } catch (err) {
                statusText.innerText = "無法開啟相機: " + err.message;
                statusText.style.color = "red";
            }
        }

        // 關閉叮嚀視窗
        function closeNotice() {
            noticeOverlay.style.display = 'none';
        }

        // 4. 拍照並上傳 Base64 邏輯
        captureBtn.onclick = function() {
            statusText.innerText = "正在擷取影像...";
            captureBtn.disabled = true;

            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            
            const ctx = canvas.getContext('2d');
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

            const base64Data = canvas.toDataURL('image/jpeg', 0.6).split(',')[1];

            // 5. 上傳至 Firebase
            database.ref('ScanControl').update({
                isWaitingForScan: true,
                imgData: base64Data,
                timestamp: Date.now()
            })
            .then(() => {
                statusText.innerText = "🚀 影像已送出，等待 3060 Ti 辨識...";
                listenForResults();
            })
            .catch(e => {
                alert("上傳失敗: " + e.message);
                captureBtn.disabled = false;
            });
        };

        // 6. 監聽 Python 回傳結果
        function listenForResults() {
            const resultRef = database.ref('ScanControl');
            resultRef.on('value', (snapshot) => {
                const data = snapshot.val();
                if (data && data.isWaitingForScan === false && data.scannedResult) {
                    statusText.innerText = "✅ 辨識結果：" + data.scannedResult;
                    statusText.style.color = "#00ff00";
                    captureBtn.disabled = false;
                }
            });
        }

        window.addEventListener('load', startCamera);
    </script>
</body>
</html>
