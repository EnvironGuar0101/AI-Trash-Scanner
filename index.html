<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>環境守護者 - AI 拍照辨識</title>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-database-compat.js"></script>
    <style>
        body { font-family: sans-serif; text-align: center; background: #222; color: white; margin: 0; padding: 20px; }
        #video-container { position: relative; display: inline-block; width: 100%; max-width: 500px; border: 5px solid #444; border-radius: 15px; overflow: hidden; background: #000; }
        video { width: 100%; height: auto; display: block; }
        .overlay-ui { margin-top: 20px; }
        #status { color: #00ff00; font-weight: bold; margin: 10px 0; }
        .btn { padding: 15px 40px; font-size: 1.2rem; background: #27ae60; color: white; border: none; border-radius: 50px; cursor: pointer; transition: 0.3s; }
        .btn:active { background: #2ecc71; transform: scale(0.95); }
        .btn:disabled { background: #7f8c8d; cursor: not-allowed; }
        canvas { display: none; } /* 隱藏畫布 */
    </style>
</head>
<body>

    <h1>AI 垃圾辨識系統</h1>
    <div id="status">正在初始化相機...</div>

    <div id="video-container">
        <video id="webcam" autoplay playsinline></video>
    </div>

    <canvas id="canvas"></canvas>

    <div class="overlay-ui">
        <p>對準垃圾後，點擊下方進行辨識：</p>
        <button id="captureBtn" class="btn">📷 拍照並辨識</button>
    </div>

    <script>
        // 1. Firebase 配置
        const firebaseConfig = {
            apiKey: "AIzaSyAWLI1eL8c7SGwxTd06rwRFgf0_KZrjNxY",
            authDomain: "environmentguardian-bf374.firebaseapp.com",
            databaseURL: "https://environmentguardian-bf374-default-rtdb.firebaseio.com",
            projectId: "environmentguardian-bf374",
            storageBucket: "environmentguardian-bf374.firebasestorage.app",
            messagingSenderId: "527271524460",
            appId: "1:527271524460:web:aea82c6e312de800780049" 
        };

        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        // 2. 元素選取
        const video = document.getElementById('webcam');
        const canvas = document.getElementById('canvas');
        const statusText = document.getElementById('status');
        const captureBtn = document.getElementById('captureBtn');

        // 3. 啟動相機
        async function startCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: "environment", width: { ideal: 640 }, height: { ideal: 480 } }, 
                    audio: false 
                });
                video.srcObject = stream;
                statusText.innerText = "相機已啟動 - 準備辨識";

                // --- 新增：成功請求相機權限後跳出叮嚀 ---
                // 延遲 500ms 跳出，確保使用者先看到相機畫面，體驗較好
                setTimeout(() => {
                    alert("🌟 拍攝叮嚀：\n請將垃圾放置於光線充足的地方再進行拍攝，以提高辨識準確度。");
                }, 500);
                // ------------------------------------

            } catch (err) {
                statusText.innerText = "無法開啟相機: " + err.message;
                statusText.style.color = "red";
            }
        }

        // 4. 拍照並上傳 Base64 邏輯
        captureBtn.onclick = function() {
            statusText.innerText = "正在擷取影像...";
            captureBtn.disabled = true;

            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            
            const ctx = canvas.getContext('2d');
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

            // 壓縮品質至 0.6 以節省傳輸量
            const base64Data = canvas.toDataURL('image/jpeg', 0.6).split(',')[1];

            // 5. 上傳至 Firebase
            database.ref('ScanControl').update({
                isWaitingForScan: true,
                imgData: base64Data,
                timestamp: Date.now()
            })
            .then(() => {
                statusText.innerText = "🚀 影像已送出，等待 3060 Ti 辨識...";
                listenForResults();
            })
            .catch(e => {
                alert("上傳失敗: " + e.message);
                captureBtn.disabled = false;
            });
        };

        // 6. 監聽 Python 回傳結果
        function listenForResults() {
            const resultRef = database.ref('ScanControl');
            resultRef.on('value', (snapshot) => {
                const data = snapshot.val();
                if (data && data.isWaitingForScan === false && data.scannedResult) {
                    statusText.innerText = "✅ 辨識結果：" + data.scannedResult;
                    statusText.style.color = "#00ff00";
                    captureBtn.disabled = false;
                }
            });
        }

        window.addEventListener('load', startCamera);
    </script>
</body>
</html>
