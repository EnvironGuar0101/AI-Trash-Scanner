<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>環境守護者 - 相機測試</title>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-database-compat.js"></script>
    <style>
        body { font-family: sans-serif; text-align: center; background: #222; color: white; margin: 0; padding: 20px; }
        #video-container { position: relative; display: inline-block; width: 100%; max-width: 500px; border: 5px solid #444; border-radius: 15px; overflow: hidden; }
        video { width: 100%; height: auto; display: block; background: black; }
        .overlay-ui { margin-top: 20px; }
        #status { color: #00ff00; font-weight: bold; margin-bottom: 10px; }
        .btn { padding: 15px 30px; font-size: 1rem; background: #27ae60; color: white; border: none; border-radius: 50px; cursor: pointer; }
    </style>
</head>
<body>

    <h1>AI 掃描鏡頭測試</h1>
    <div id="status">正在請求相機權限...</div>

    <div id="video-container">
        <video id="webcam" autoplay playsinline></video>
    </div>

    <div class="overlay-ui">
        <p>看到畫面後，點擊下方測試通訊：</p>
        <button id="testBtn" class="btn">測試連動 Unity</button>
    </div>

    <script>
        // 1. Firebase 配置 (保持你之前的設定)
        const firebaseConfig = {
            apiKey: "AIzaSyAWLI1eL8c7SGwxTd06rwRFgf0_KZrjNxY",
            authDomain: "environmentguardian-bf374.firebaseapp.com",
            databaseURL: "https://environmentguardian-bf374-default-rtdb.firebaseio.com",
            projectId: "environmentguardian-bf374",
            storageBucket: "environmentguardian-bf374.firebasestorage.app",
            messagingSenderId: "527271524460",
            appId: "1:527271524460:web:aea82c6e312de800780049" 
        };

        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        // 2. 相機驅動邏輯
        const video = document.getElementById('webcam');
        const statusText = document.getElementById('status');

        async function startCamera() {
            try {
                // 請求後置鏡頭 (environment)
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: "environment" }, 
                    audio: false 
                });
                video.srcObject = stream;
                statusText.innerText = "相機已啟動";
            } catch (err) {
                statusText.innerText = "無法開啟相機: " + err.message;
                statusText.style.color = "red";
                console.error("Camera Error: ", err);
            }
        }

        // 3. 測試按鈕 (保留原本功能確保通訊正常)
        document.getElementById('testBtn').onclick = function() {
            database.ref('/').update({ isScanned: true })
            .then(() => alert("通訊成功！Unity 應已關閉視窗"))
            .catch(e => alert("錯誤: " + e.message));
        };

        // 頁面載入後自動啟動相機
        window.addEventListener('load', startCamera);
    </script>
</body>
</html>
